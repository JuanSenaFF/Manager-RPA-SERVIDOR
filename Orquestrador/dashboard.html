<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orquestrador — Manager RPA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f14;
      --surface: #161b27;
      --surface2: #1e2535;
      --border: #2a3347;
      --accent: #4f8ef7;
      --accent-glow: rgba(79,142,247,0.15);
      --green: #22c55e;
      --green-glow: rgba(34,197,94,0.12);
      --red: #ef4444;
      --red-glow: rgba(239,68,68,0.10);
      --yellow: #f59e0b;
      --muted: #64748b;
      --text: #e2e8f0;
      --radius: 14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px 24px;
    }

    /* ── Header ─────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .logo { display: flex; align-items: center; gap: 12px; }

    .logo-icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border-radius: 10px;
      display: grid;
      place-items: center;
      font-size: 20px;
    }

    h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
    .subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .refresh-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .pulse-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    .countdown { font-weight: 600; color: var(--accent); min-width: 14px; text-align: right; }

    /* ── Barra de Filtros ────────────────────────── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 28px;
    }

    .filter-btn {
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px rgba(79,142,247,0.3);
    }

    /* ── Seção de Servidor ───────────────────────── */
    .agent-section { margin-bottom: 40px; }

    .agent-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }

    .agent-title {
      font-size: 16px;
      font-weight: 600;
      font-family: monospace;
    }

    .env-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .env-teste    { background: rgba(245,158,11,0.15); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
    .env-producao { background: rgba(79,142,247,0.12); color: var(--accent); border: 1px solid rgba(79,142,247,0.25); }

    .server-status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .server-status-badge.online  { background: rgba(34,197,94,0.12); color: var(--green); }
    .server-status-badge.offline { background: rgba(100,116,139,0.15); color: var(--muted); }

    .slot-count {
      margin-left: auto;
      font-size: 12px;
      color: var(--muted);
    }

    .slot-count span { color: var(--text); font-weight: 600; }

    /* ── Grid de Perfis ──────────────────────────── */
    .perfis-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    /* ── Card de Perfil ──────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: border-color 0.3s, box-shadow 0.3s;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
      border-radius: var(--radius);
    }

    .card.rodando { border-color: rgba(34,197,94,0.3); }
    .card.rodando::before { background: var(--green-glow); opacity: 1; }
    .card.offline { border-color: rgba(100,116,139,0.2); opacity: 0.6; }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .perfil-nome {
      font-size: 13px;
      font-weight: 700;
      font-family: monospace;
      color: var(--accent);
    }

    .perfil-slot {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      white-space: nowrap;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .status-badge.rodando { background: rgba(34,197,94,0.15); color: var(--green); }
    .status-badge.livre   { background: rgba(100,116,139,0.15); color: var(--muted); }
    .status-badge.offline { background: rgba(100,116,139,0.10); color: #475569; }

    .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .rodando .status-dot { animation: pulse 2s infinite; }

    .rpa-info {
      min-height: 36px;
      margin-bottom: 16px;
    }

    .rpa-nome {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .pid-label {
      font-size: 11px;
      color: var(--muted);
      font-family: monospace;
    }

    .pid-label span { color: var(--accent); }

    .rpa-livre { font-size: 13px; color: var(--muted); padding-top: 4px; }

    /* ── Botões ──────────────────────────────────── */
    .actions { display: flex; gap: 8px; }

    .btn {
      flex: 1;
      padding: 9px 14px;
      border: none;
      border-radius: 9px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      font-family: 'Inter', sans-serif;
    }

    .btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn:not(:disabled):hover { transform: translateY(-1px); }
    .btn:not(:disabled):active { transform: translateY(0); }

    .btn-start { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; box-shadow: 0 4px 12px rgba(34,197,94,0.2); }
    .btn-stop  { background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; box-shadow: 0 4px 12px rgba(239,68,68,0.2); }

    .btn-start:not(:disabled):hover { box-shadow: 0 6px 20px rgba(34,197,94,0.4); }
    .btn-stop:not(:disabled):hover  { box-shadow: 0 6px 20px rgba(239,68,68,0.4); }

    /* ── Toast ───────────────────────────────────── */
    .toast-container {
      position: fixed;
      bottom: 28px; right: 28px;
      display: flex; flex-direction: column;
      gap: 10px; z-index: 999;
    }

    .toast {
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      max-width: 320px;
      animation: slideIn 0.3s ease;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .toast.success { background: #14532d; border: 1px solid #22c55e; color: #86efac; }
    .toast.error   { background: #450a0a; border: 1px solid #ef4444; color: #fca5a5; }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* ── Empty ───────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty .icon { font-size: 38px; margin-bottom: 12px; }

    /* ── Spinner ─────────────────────────────────── */
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🌐</div>
    <div>
      <h1>Orquestrador</h1>
      <div class="subtitle">Visão central de todos os Servidores RPA</div>
    </div>
  </div>
  <div class="header-right">
    <div class="refresh-badge">
      <div class="pulse-dot"></div>
      Atualizando em <span class="countdown" id="countdown">5</span>s
    </div>
  </div>
</header>

<!-- Filtros de Servidor -->
<div class="filter-bar" id="filter-bar">
  <button class="filter-btn active" onclick="filtrar('todos')" id="btn-filter-todos">Todos</button>
</div>

<div id="dashboard-container">
  <div class="empty"><div class="icon">⏳</div>Carregando status dos servidores...</div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
  const API = 'http://localhost:5000';
  let countdown = 10;
  let timer;
  let filtroAtivo = 'todos';
  let ultimosDados = {};

  function timeAgo(iso) {
    if (!iso) return '—';
    try { return new Date(iso).toLocaleTimeString('pt-BR'); } catch { return '—'; }
  }

  // ── Filtro por servidor ─────────────────────────────────────────
  function filtrar(serverId) {
    filtroAtivo = serverId;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`btn-filter-${serverId}`)?.classList.add('active');

    document.querySelectorAll('.agent-section').forEach(sec => {
      sec.style.display = (serverId === 'todos' || sec.dataset.host === serverId) ? '' : 'none';
    });
  }

  // ── Monta barra de filtros ──────────────────────────────────────
  function buildFilters(agents) {
    const bar = document.getElementById('filter-bar');
    const existingIds = new Set([...bar.querySelectorAll('.filter-btn')].map(b => b.dataset.id));

    Object.keys(agents).forEach(agentId => {
      if (!existingIds.has(agentId)) {
        const label = agentId.replace('BRTDTBGS', '').replace('SL', '').replace('-LOCAL', ' LOCAL');
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.textContent = label;
        btn.id = `btn-filter-${agentId}`;
        btn.dataset.id = agentId;
        btn.onclick = () => filtrar(agentId);
        bar.appendChild(btn);
      }
    });
  }

  // ── Render Dashboard ────────────────────────────────────────────
  function renderDashboard(agents) {
    ultimosDados = agents;
    buildFilters(agents);

    const container = document.getElementById('dashboard-container');
    const keys = Object.keys(agents);

    if (keys.length === 0) {
      container.innerHTML = '<div class="empty"><div class="icon">📡</div>Aguardando heartbeats dos Agents...</div>';
      return;
    }

    let html = '';

    keys.forEach(agentId => {
      const info    = agents[agentId];
      const online  = info.status === 'online';
      const perfis  = info.perfis || [];
      const slots   = info.slots_ocupados || 0;
      const cap     = info.capacidade_maxima || perfis.length;
      const env     = info.ambiente || 'producao';
      const display = (filtroAtivo === 'todos' || filtroAtivo === agentId) ? '' : 'none';

      html += `
        <div class="agent-section" data-host="${agentId}" style="display:${display}">
          <div class="agent-header">
            <span class="agent-title">🖥️ ${agentId}</span>
            <span class="env-badge env-${env}">${env}</span>
            <div class="server-status-badge ${info.status}">
              <div class="status-dot"></div>
              ${info.status.toUpperCase()}
            </div>
            ${info.last_seen ? `<span style="font-size:11px;color:var(--muted)">Último heartbeat: ${timeAgo(info.last_seen)}</span>` : ''}
            <span class="slot-count"><span>${slots}</span>/${cap} slots ativos</span>
          </div>
          <div class="perfis-grid">
      `;

      if (perfis.length === 0) {
        html += `<div style="color:var(--muted);font-size:13px;">Nenhum perfil configurado para este servidor.</div>`;
      } else {
        html += perfis.map(p => {
          const st     = p.status || 'offline';
          const slot   = p.slot || p.usuario;
          const rpa    = p.rpa_ativo;
          const pid    = p.pid;
          const disabledAll = !online || st === 'offline' ? 'disabled' : '';

          return `
            <div class="card ${st}" id="card-${agentId}-${slot}">
              <div class="card-header">
                <div>
                  <div class="perfil-nome">${p.usuario}</div>
                  <div class="perfil-slot">${slot !== p.usuario ? slot : ''}</div>
                </div>
                <div class="status-badge ${st}">
                  <div class="status-dot"></div>
                  ${st === 'rodando' ? 'RODANDO' : st === 'livre' ? 'LIVRE' : 'OFFLINE'}
                </div>
              </div>

              <div class="rpa-info">
                ${rpa
                  ? `<div class="rpa-nome">${rpa}</div>
                     <div class="pid-label">PID: <span>${pid ?? '—'}</span></div>`
                  : `<div class="rpa-livre">⊘ Nenhum RPA ativo</div>`
                }
              </div>

              <div class="actions">
                <button class="btn btn-start" id="btn-start-${agentId}-${slot}"
                  onclick="acao('${agentId}', '${slot}', 'start')"
                  ${st === 'rodando' || disabledAll ? 'disabled' : ''}>
                  ▶ Iniciar
                </button>
                <button class="btn btn-stop" id="btn-stop-${agentId}-${slot}"
                  onclick="acao('${agentId}', '${slot}', 'stop')"
                  ${st !== 'rodando' || disabledAll ? 'disabled' : ''}>
                  ■ Encerrar
                </button>
              </div>
            </div>
          `;
        }).join('');
      }

      html += `</div></div>`;
    });

    container.innerHTML = html;
  }

  // ── Fetch Status ────────────────────────────────────────────────
  async function fetchStatus() {
    try {
      const res = await fetch(`${API}/status`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      renderDashboard(data.agents);
    } catch {
      toast('Falha ao conectar no Orquestrador.', 'error');
    }
  }

  // ── Ação Start/Stop ─────────────────────────────────────────────
  async function acao(agentId, slot, tipo) {
    const isStart = tipo === 'start';
    const btnId   = `btn-${tipo}-${agentId}-${slot}`;
    const btn     = document.getElementById(btnId);

    if (btn) {
      btn.disabled = true;
      btn.dataset.original = btn.innerHTML;
      btn.innerHTML = '<span class="spinner"></span>';
    }

    try {
      const url = isStart
        ? `${API}/agents/${encodeURIComponent(agentId)}/scripts/${encodeURIComponent(slot)}/start`
        : `${API}/agents/${encodeURIComponent(agentId)}/scripts/${encodeURIComponent(slot)}/stop`;

      const res  = await fetch(url, { method: isStart ? 'POST' : 'DELETE' });
      const data = await res.json();

      if (res.ok) {
        toast(data.mensagem || '✅ Operação enviada!', 'success');
        await fetchStatus();
      } else {
        toast(data.detail || '❌ Erro na operação.', 'error');
      }
    } catch {
      toast('❌ Sem resposta do Orquestrador.', 'error');
    } finally {
      if (btn) {
        btn.innerHTML = btn.dataset.original;
        btn.disabled  = false;
      }
    }
  }

  // ── Toast ───────────────────────────────────────────────────────
  function toast(msg, tipo) {
    const el = document.createElement('div');
    el.className = `toast ${tipo}`;
    el.textContent = msg;
    document.getElementById('toasts').appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }

  // ── Countdown ───────────────────────────────────────────────────
  function startCountdown() {
    clearInterval(timer);
    countdown = 10;
    document.getElementById('countdown').textContent = countdown;
    timer = setInterval(async () => {
      countdown--;
      document.getElementById('countdown').textContent = countdown;
      if (countdown <= 0) {
        await fetchStatus();
        countdown = 10;
      }
    }, 1000);
  }

  fetchStatus().then(startCountdown);
</script>

</body>
</html>
