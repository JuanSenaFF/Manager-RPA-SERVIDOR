# =============================================================================
# infra.yaml — Configuração de Infraestrutura do Orquestrador RPA
# =============================================================================
# Este arquivo define a topologia completa dos servidores e RPAs disponíveis.
# Ambientes: 'teste' (máquina local) | 'producao' (servidores reais)
# Para adicionar um novo servidor, basta incluir um novo item na lista `servidores`.
# Para adicionar um novo RPA, inclua-o na lista `rpas`.
# O Orquestrador lê este arquivo na inicialização para montar o registro de agentes.
# =============================================================================


